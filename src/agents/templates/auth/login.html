<!DOCTYPE html>
<html lang="en" data-theme="{{ request.cookies.get('theme', 'dark') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paperweight — sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-content);
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .auth-card {
      width: 100%;
      max-width: 360px;
      padding: 40px 36px;
      background: var(--bg-chrome);
      border: 1px solid var(--border-default);
      border-radius: 12px;
    }
    .auth-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .auth-field {
      margin-bottom: 16px;
    }
    .auth-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .auth-field input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: var(--bg-content);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-field input:focus {
      border-color: var(--accent-focus);
    }
    .auth-submit {
      width: 100%;
      padding: 10px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .auth-submit:hover { opacity: 0.9; }
    .auth-submit:active { opacity: 0.8; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }
    .auth-github {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--bg-content);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      box-sizing: border-box;
    }
    .auth-github:hover {
      border-color: var(--accent-focus);
      background: var(--bg-chrome);
    }
    .auth-error {
      padding: 10px 12px;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 6px;
      color: var(--status-error);
      font-size: 13px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">paperweight</div>
    <div class="auth-subtitle">Background Agent Runner</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    {% if github_oauth_enabled %}
    <a href="/auth/github" class="auth-github">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continue with GitHub
    </a>
    <div class="auth-divider">or</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="auth-field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username"
               placeholder="your username" autofocus required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="auth-submit">Sign in</button>
    </form>
  </div>
</body>
</html>
