<div id="agent-tab" style="display:flex;flex-direction:column;height:100%;font-family:'Ubuntu Mono',monospace;">
  <!-- Status bar -->
  <div id="agent-status-bar" style="display:flex;justify-content:space-between;align-items:center;
              padding:6px 14px;background:var(--bg-chrome);border-bottom:1px solid var(--border-subtle);
              font-size:10px;flex-shrink:0;">
    <div style="display:flex;gap:12px;align-items:center;">
      <label style="color:var(--text-muted);">model:
        <select id="agent-model" style="background:var(--bg-chrome);border:1px solid var(--border-default);
                       color:var(--text-primary);border-radius:3px;padding:1px 4px;font-size:10px;font-family:inherit;">
          <option value="claude-sonnet-4-6" {{ 'selected' if not session or session.model == 'claude-sonnet-4-6' }}>sonnet</option>
          <option value="claude-haiku-4-5-20251001" {{ 'selected' if session and session.model == 'claude-haiku-4-5-20251001' }}>haiku</option>
          <option value="claude-opus-4-6" {{ 'selected' if session and session.model == 'claude-opus-4-6' }}>opus</option>
        </select>
      </label>
      <label style="color:var(--text-muted);">budget:
        <input id="agent-budget" type="number" step="0.5" min="0.1" max="10"
               value="{{ session.max_cost_usd if session else 2.0 }}"
               style="width:50px;background:var(--bg-chrome);border:1px solid var(--border-default);
                      color:var(--text-primary);border-radius:3px;padding:1px 4px;font-size:10px;
                      font-family:inherit;text-align:right;">
      </label>
      <span id="agent-cost" style="color:var(--text-muted);">cost: <span style="color:var(--status-success);">$0.00</span></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="agent-session-status"
            data-session-id="{{ session.id if session else '' }}"
            style="color:var(--text-muted);">
        {{ 'session: ' + session.id[:8] if session else 'sem sessão' }}
      </span>
      {% if session %}
      <button onclick="endAgentSession('{{ session.id }}')"
              style="padding:2px 8px;font-size:9px;color:var(--text-muted);background:transparent;
                     border:1px solid var(--border-default);border-radius:3px;cursor:pointer;font-family:inherit;
                     transition:all .15s;"
              onmouseover="this.style.borderColor='var(--status-error)';this.style.color='var(--status-error)'"
              onmouseout="this.style.borderColor='var(--border-default)';this.style.color='var(--text-muted)'">Encerrar</button>
      {% endif %}
    </div>
  </div>

  <!-- Terminal output -->
  <div id="agent-output" style="flex:1;overflow-y:auto;padding:16px 18px;background:#0a0c14;font-size:13px;line-height:1.8;">
    {% if not session %}
    <div style="color:#6b7280;font-style:italic;">Escreva uma instrução abaixo para iniciar.</div>
    {% endif %}
  </div>

  <!-- Prompt input — taller, more visible -->
  <div style="display:flex;align-items:center;border-top:1px solid #1e2130;background:#0f1118;flex-shrink:0;">
    <span style="color:var(--accent);padding:14px 6px 14px 18px;font-size:15px;font-weight:700;">&gt;</span>
    <input id="agent-input" type="text"
           placeholder="{{ 'Continuar a sessão...' if session else 'Escreva uma instrução...' }}"
           autocomplete="off"
           style="flex:1;background:transparent;border:none;color:#e8eaed;padding:14px 10px;
                  font-family:'Ubuntu Mono',monospace;font-size:14px;outline:none;
                  caret-color:var(--accent);"
           onkeydown="if(event.key==='Enter'&&!this.disabled)sendAgentPrompt('{{ id }}')">
    <div style="padding:0 14px;">
      <span style="font-size:9px;color:#4b5563;border:1px solid #2a2d3a;
                   padding:2px 6px;border-radius:3px;">Enter</span>
    </div>
  </div>
</div>

<style>
  @keyframes thinking-pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  #agent-input::placeholder {
    color: #6b7280;
  }
  #agent-input:disabled::placeholder {
    color: #3b82f6;
  }
</style>

<script src="/static/agent.js"></script>
<script>
  var _focusRun = '{{ focus_run }}';
  if (_focusRun) {
    _agentSessionId = '{{ session.id if session else "" }}';
    loadRunHistory(_focusRun);
  } else {
    initAgentTab();
  }
</script>
