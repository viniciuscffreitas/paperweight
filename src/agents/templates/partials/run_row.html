{% from "components/macros.html" import status_dot, list_row %}
{% call list_row() %}
  {{ status_dot(run.status) }}
  <span style="flex:1;font-size:12px;color:var(--text-primary);">{{ run.task }}</span>
  {% if run.cost_usd %}
  <span style="font-size:11px;color:var(--text-muted);">${{ "%.2f" | format(run.cost_usd) }}</span>
  {% endif %}
  {% if run.pr_url %}
  <a href="{{ run.pr_url }}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;">PR ↗</a>
  {% endif %}
{% endcall %}
