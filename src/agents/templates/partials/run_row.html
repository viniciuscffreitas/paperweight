{% from "components/macros.html" import status_dot %}
{% set is_agent = run.trigger_type == 'agent' and run.session_id %}
<div {% if is_agent %}
       hx-get="/hub/{{ run.project }}/agent?session={{ run.session_id }}&run={{ run.id }}"
       hx-target="#tab-content"
       onclick="activateTab(document.querySelector('[hx-get*=\'/agent\']'))"
       role="button" tabindex="0"
       onkeydown="if(event.key==='Enter')this.click()"
     {% endif %}
     style="display:flex;align-items:center;gap:8px;padding:8px 12px;
            border-bottom:1px solid var(--border-subtle);transition:background .15s;
            {{ 'cursor:pointer;' if is_agent else '' }}"
     onmouseover="this.style.background='var(--bg-overlay)'"
     onmouseout="this.style.background='transparent'">
  {{ status_dot(run.status) }}
  <span style="flex:1;font-size:12px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ run.task }}</span>
  {% if run.cost_usd %}
  <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">${{ "%.2f" | format(run.cost_usd) }}</span>
  {% endif %}
  {% if run.pr_url %}
  <a href="{{ run.pr_url }}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;" onclick="event.stopPropagation()">PR ↗</a>
  {% endif %}
</div>
