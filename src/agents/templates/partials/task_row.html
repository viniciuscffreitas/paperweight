{% set bg = "var(--bg-task-hover)" if task.get("enabled", 1) else "#12151f" %}
<div style="display:flex;align-items:center;padding:8px 12px;border-radius:6px;background:{{ bg }};gap:8px;">
  <div style="flex:1;min-width:0;">
    <div style="font-size:13px;color:var(--text-primary);">{{ task.name }}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">
      {{ task.trigger_type }} · {{ task.model }} · ${{ "%.2f" | format(task.max_budget) }}
    </div>
  </div>
  <button hx-post="/tasks/{{ id }}/{{ task.name }}/run"
          hx-swap="none"
          aria-label="Run {{ task.name }}"
          onclick="(function(btn){
            btn.textContent = 'Queued';
            btn.disabled = true;
            btn.style.color = 'var(--text-disabled)';
            btn.style.borderColor = 'var(--border-subtle)';
            btn.style.cursor = 'not-allowed';
            setTimeout(function(){
              btn.textContent = 'Run';
              btn.disabled = false;
              btn.style.color = 'var(--text-muted)';
              btn.style.borderColor = 'var(--border-default)';
              btn.style.cursor = 'pointer';
            }, 3000);
          })(this)"
          style="padding:3px 10px;font-size:10px;color:var(--text-muted);background:transparent;
                 border:1px solid var(--border-default);border-radius:4px;cursor:pointer;font-family:inherit;
                 letter-spacing:.3px;transition:all .15s;flex-shrink:0;"
          onmouseover="if(!this.disabled){this.style.borderColor='var(--accent)';this.style.color='var(--accent)';}"
          onmouseout="if(!this.disabled){this.style.borderColor='var(--border-default)';this.style.color='var(--text-muted)';}">Run</button>
  <span style="font-size:10px;padding:2px 6px;border-radius:3px;
               background:{{ 'var(--bg-task-success)' if task.get('enabled', 1) else 'var(--bg-task-error)' }};
               color:{{ 'var(--status-success)' if task.get('enabled', 1) else 'var(--status-error)' }};">
    {{ 'ON' if task.get('enabled', 1) else 'OFF' }}
  </span>
</div>
