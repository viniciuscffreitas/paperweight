<div style="display:flex;align-items:center;padding:10px 12px;border-radius:6px;background:var(--bg-elevated);gap:10px;cursor:pointer;transition:background .15s"
     hx-get="/hub/{{ item.project }}/agent?session={{ item.session_id }}" hx-target="#tab-content"
     onmouseover="this.style.background='var(--bg-task-hover)'" onmouseout="this.style.background='var(--bg-elevated)'">
  <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:{% if item.status == 'running' %}var(--status-running){% elif item.status in ('done', 'review') %}var(--status-success){% elif item.status == 'failed' %}var(--status-error){% elif item.status == 'pending' %}var(--status-warning){% else %}var(--text-muted){% endif %}"></span>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ item.title }}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:2px">
      {{ item.source }}{% if item.pr_url %} · <a href="{{ item.pr_url }}" target="_blank" style="color:var(--accent)" onclick="event.stopPropagation()">PR</a>{% endif %}
    </div>
  </div>
  <span style="font-size:10px;padding:2px 8px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;
               background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-muted)">{{ item.status }}</span>
</div>
