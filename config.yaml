budget:
  daily_limit_usd: ${BUDGET_DAILY_LIMIT:10.00}       # safe default; set env var to override
  warning_threshold_usd: ${BUDGET_WARNING:7.00}
  pause_on_limit: ${BUDGET_PAUSE:true}               # stop spawning when budget hit

notifications:
  slack_webhook_url: ${SLACK_WEBHOOK_URL}

webhooks:
  github_secret: ${GITHUB_WEBHOOK_SECRET}
  linear_secret: ${LINEAR_WEBHOOK_SECRET}

execution:
  worktree_base: /tmp/agents
  default_model: sonnet
  default_max_cost_usd: 5.00
  default_autonomy: pr-only
  max_concurrent: 3
  timeout_minutes: 30
  dry_run: false

server:
  host: 0.0.0.0
  port: 8080

coordination:
  enabled: false               # set true to enable inter-agent coordination
  mode: full-mesh              # off | awareness-only | full-mesh
  claim_timeout_seconds: 300   # auto-release claims after 5min inactivity
  poll_interval_ms: 500        # broker inbox polling frequency
  auto_rebase: true            # rebase branches after mediation
  mediator:
    model: claude-sonnet-4-6
    max_cost_usd: 1.00
    timeout_minutes: 5
    max_concurrent: 2

integrations:
  linear_api_key: ${LINEAR_API_KEY}
  discord_bot_token: ${DISCORD_BOT_TOKEN}
  discord_guild_id: ${DISCORD_GUILD_ID}
  github_token: ${GITHUB_TOKEN}
  slack_bot_token: ${SLACK_BOT_TOKEN}
